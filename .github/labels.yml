# Labels da suíte PMD — aplicar com: bash .github/scripts/setup-labels.sh
# Três dimensões: tipo · escopo · status

# Tipo
- name: "feat"
  color: "1d76db"
  description: "Nova funcionalidade ou melhoria"
- name: "bug"
  color: "d73a4a"
  description: "Comportamento incorreto"
- name: "refactor"
  color: "5319e7"
  description: "Refatoração sem mudança de comportamento"
- name: "docs"
  color: "0075ca"
  description: "Documentação / regras de negócio"
- name: "infra"
  color: "455a64"
  description: "Infraestrutura, build, CI, Supabase"
- name: "integração"
  color: "fbca04"
  description: "Contrato CUD ↔ SPD (auth, permissões, entidades)"
- name: "test"
  color: "0e8a16"
  description: "Testes automatizados"

# Escopo
- name: "cud"
  color: "c5def5"
  description: "Central de Usuários de Dourados"
- name: "spd"
  color: "bfd4f2"
  description: "Sistema de Protocolo Digital"
- name: "rh"
  color: "b3e5d1"
  description: "Sistema de Recursos Humanos"
- name: "infra-escopo"
  color: "d4c5f9"
  description: "Infra compartilhada (Supabase, Redis)"
- name: "pmd"
  color: "e8eaf6"
  description: "Transversal ao workspace"

# Status
- name: "status:backlog"
  color: "ededed"
  description: "Aguardando início"
- name: "status:em-andamento"
  color: "fbca04"
  description: "Em desenvolvimento agora"
- name: "status:revisão"
  color: "0075ca"
  description: "Em revisão / PR aberto"
- name: "status:bloqueado"
  color: "d73a4a"
  description: "Bloqueado por dependência"
